<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alapok</title>
    <link rel="stylesheet" href="./stilus.css">
</head>
<body>
    <div class='kulso elso'>
        <h1>Első fejléc</h1>
        <p>Első paragrafus</p>
        <h2>Tetszőleges szöveg</h2>.
        <ul>
            <li>Első elem</li>
            <li>Második elem</li>
        </ul>
    </div>
    <div class='kulso masodik'>
        <h1>Második fejléc</h1>
        <p>Második paragrafus</p>
        <h2>Tetszőleges szöveg</h2>.
        <ul>
            <li>Harmadik elem</li>
            <li>Negyedik elem</li>
        </ul>
    </div>
    <table>
        <tr>
            <th>Vezetéknév</th>
            <th colspan="2">Keresztnév</th>
        </tr>
        <tr>
            <td rowspan="2">Varga</td>
            <td>Emma</td>
            <td>Gabriella</td>
        </tr>
        <tr>
            <td>Rozália</td>
            <td rowspan="2">Emese</td>
        </tr>
        <tr>
            <td>Nagy</td>
            <td>Edit</td>
        </tr>
    </table>
    <div class="tarto">
        <div class="belso"></div>
    </div>
</body>
</html>
